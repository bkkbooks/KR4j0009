情休負一春詩又荷蓋傾新緑榴巾蹙舊紅水亭烟榭晚涼中又是一鈎新月靜房櫳絲藕清如雪幮紗薄似空好懷今夜與誰同喚取玉人來共一簾風又野水尋溪路青山踏晚春偶來相值却鍾情一樹瓊瑤洗盡客衣襟曲沼通詩夢幽窗淨俗塵何時散髮伴襜裙後夜相思生怕月愁人入塞好思量正秋風半夜長奈銀釭一㸃耿耿背西窗衾又涼枕又涼露華凄凄月半床照得人真箇斷腸窗前誰􅒓朩犀黃花也香夢也香西江月衆緑初圍夏䕃老紅猶駐春妝畫簾燕子日偏長靜看新雛來往原缺後段又或與上文混作一闋非情兹調雖有後段更韻者玩此詞文逈非一闋原缺前段汲井漫隨蘭炷心情半怯羅衣粉香銷盡無人覻只門外子規啼又牆外雨肥梅子階前水繞荷花隂隂庭户薰風滿水紋簟怯菱芽春盡難憑燕語日長惟有蜂衙沈香火冷珠簾暮箇人在碧窗紗眼兒媚一枝烟雨瘦東牆真箇斷人腸不為天寒日暮誰憐水逺山長相思月底相思竹外猶自禁當只恐玉樓貪夢輸他一夜清香朝中措矮窗西畔翠荷香人在小池塘何事未拈棋局却來閒倚胡床金盆弄水玉叉嚲鬢妝懶何妨莫道困來不飲今宵恰恨天涼又茶詞華筵飲散撤芳尊人影亂紛紛且約玉驄留住細將團鳯平分一甌看取招回酒興爽徹詩魂歌罷清風兩腋歸來明月千門又湯詞龍團分罷覺芳滋歌徹碧雲詞翠袖且留纎玉沈香載捧水瓷一聲清唱半甌輕啜愁緒如絲記取臨分餘味圖教歸後相思又詠三十九數真遊六六洞中仙騎鶴下三天休道日斜嵗暮行年方是韶華相逢一笑此心不動須待明年要得安排穩當除非四十相連樂天詩有行年三十九嵗暮日斜時之句又片花飛後水東流無計挽春留香小誰栽杜若夢回依舊揚州破瓜年在嬌花艷冶舞栁纎柔莫道劉郎霜鬢才情未放春休烏夜啼楊栁拖烟漠漠梨花􅒓月溶溶吹香院落春還盡憔悴立東風只道芳時易見誰知密約難通芳園繞遍無人間獨自拾殘紅又醉枕不能眠白酒欺人易醉黃花笑我多愁一年只有秋光好獨自却悲秋風急常吹夢去月遲多為人留半黃橙子和詩卷空自伴床頭又緑外深深栁巷紅間曲曲花樓一春想見貪遊冶不道有人愁三月東風易老幾宵明月難留酴醿白盡窗前也還肯醉來否又靜院槐風緑漲小窗梅雨黃埀欲看春事留連處惟有夜寒知夢裏閒消午醉掃花共坐風凉歸來窗北胡床興在羲皇以上虞美人影粉霜拂拂凝香砌醞釀梅花天氣月上小窗如水冷􅒓人無寐平生可慣閒憔悴擔負新愁不起消遣夜長無計只倚熏香睡一落索門外鶯寒楊栁正減歡疏酒春陰早是做人愁更何况花飛後莫倚東風消瘦有酴醿入手儘偎香玉醉何妨任花落愁依舊又歌者索詞名一東小小腰身相稱更著人心性一聲歌起繡簾隂都遏住行雲影聞道玉郎家近被春風勾引從今莫怪一東看自壓盡人間韻憶秦娥青門深海棠開盡春陰陰春陰陰萬里雲水一寸歸心玉樓深鎖烟消沈知他何日同登臨同登臨待收紅淚細說如今又情脈脈半黃橙子和香擘和香擘分明記得袖香薰窄别來人逺關山隔見梅不忍和花摘和花摘有書無雁寄誰歸得又愁無語黃昏庭院黃梅雨黃梅雨新愁一寸舊愁千縷杜鵑呌斷空山苦相思欲寄人何許人何許一重雲斷一重山阻好事近資中道上無雙堠感懷作别夢記春前春盡苦無歸日想見鵲聲庭院誤幾回消息萬重離恨萬重山無處說思憶只有路傍雙堠也隨人孤隻又待月不至天淡一簾秋明月幾時來得何事桂低香近把清光邀勒人間明晦總由天何必問通塞且為人如月好醉莫分南北又烟盡戌樓空又是一簾佳月何事山城留滯負好花時節燒燈剪綵沒心情應有翠娥說欲借好風吹恨奈亂雲愁疊又急雨鬧氷荷銷盡一襟煩暑趂取晚涼幽㑹近翠隂濃處風梢危滴亂珠璣灑面得新句莫惜玉壺傾盡待月明歸去清平樂山城桃李催促春無幾日日為花須早起猶惜花無計阿誰留得春風長教繞緑圍紅莫遣十分芳意輸他萬㸃愁容又酬王靜父紅朩犀詞秋香誰買散入琉璃界㸃綴小紅全不礙還却鉛華餘債夜來月底相期一枝未覺香遲恰似青綾帳底絳羅初試裙兒又詠雪疏疏整整風急花無定紅燭照筵寒欲凝時見篩簾玉影夜深明月籠紗醉歸掠面香斜猶有惜梅心在滿庭誤作吹花又緑深紅少栁外橫橋小雙燕不知幽夢好驚起碧窗春曉起來瞢𩮰多時玉臺金鏡慵移多少春愁未說却來閒數花枝謁金門杏花春悄悄紅到一枝先巧酒入半腮微帶丣粉寒香未飽芳意枝頭偏鬧困盡蜂鬚鶯爪擬倩玉纎和露拗情多愁易攪又荼䕷花簇簇觸眼萬條埀玉小院春深窗鎖緑水沈風斷續明月又侵樓曲羞向枕囊拘束只待夜深清影足醉來花底宿又陪蘇子重諸友飲東山烏帽側行遍杏花春色野意青青分隴麥人家烟水隔春事莫催行客彈指青梅堪摘醉倚暮天江拍拍雨晴沙路白又病起花半溼一霎晚雲籠密天氣未佳風又急小庭愁獨立酒病起來無力懊惱篆烟鎖碧一晌春情無處覓小屏山數尺又春夜雨催潤栁塘花塢小院深深門幾許畫簾香一縷獨立晚庭凝竚細把花枝閒數燕子不來天欲暮說愁無處所又風陳陳吹落楊花無定酒病厭厭三月盡花檀紅自隱新緑軒窗清潤月影又移牆影手撚青梅無處問一春長悶損又濃睡醒驚對一簾秋影楓葉乍零風不定半窗疏雨影愁與年光不盡老入星星雙鬢只擬上樓尋逺信雁遙烟水瞑卜算子枕簟暑風消簾幕秋風動月到宵來愁處明只照團衾鳯去意杳無憑别語愁難送一紙魚箋枕底香且做新來夢又獨自上層樓樓外青山逺望到斜陽欲盡時不見西飛雁獨自下層樓樓下蛩聲怨待到黃昏月上時依舊柔腸斷又幾日賞花天月淡荼䕷小寫盡相思喚不來又是花飛了春在怕愁多春去憐歡少一夜安排夢不成月墮西窗曉霜天曉角幾夜瑣窗揭素蟾光似雪恰恨照人欹枕紗㡡爽簟紋滑迤邐篆香裛好懷誰共說若是知人風味來分付半牀月又玉清氷樣潔幾夜相思切誰料濃雲遮擁同心帶甚時結囱囱休惜别還有來時節記取江隂歸路須共踏夜深月減字朩蘭花雙雙相並一㸃紅邊偏照映玉剪雲裁不比浮花共蒂開幾回心曲選勝摘來情自足插向雲鬟要與仙郎比並看菩薩鬘和風映日西郊路遊人又踏青山去何處碧雲衫映溪才兩三疏松分翠黛故作羞春態回首杏烟消月明歸渡橋又春回緑野烟光薄低花矮栁田家樂隴麥又青青喧蜂閒趂人野翁忘近逺怪識劉郎面斷却小橋溪怕人溪外知又訪江東外家作畫橋拍拍春江緑行人正在春江曲花潤接平川有人花底眠東風元自好只怕催花老安得萬埀楊繫教春日長又平蕪冉冉連雲緑斜陽襯雨明溪足小鴨睡晴沙翠烘三兩花春光閒婉娩盡日無人見試著小屏山圖歸雲際看又正月三日西山即事山頭翠樹調鶯舌山腰野菜飛黃蝶來為等閒休去成多少愁小庭花朩改猶有啼痕在别後不曾看怕花和淚殘又羅衫乍試寒猶怯妬花風雨連三月燈冷閉門時有愁誰得知此情真個苦只為當時語莫道絮沾泥絮飛魂亦飛又夜來花底鶯饒舌把人心事分明說許大好因緣只成容易傳春闌無好計惟有歸來是從此玉臺前曉妝休太妍又小窗䕃緑清無暑篆香終日縈蘭炷氷簟漲寒濤清風一枕高有人團扇却門掩庭花落少待月侵床照教魂夢涼又回文暑庭消盡風鳴樹樹鳴風盡消庭暑橫枕一聲鶯鶯聲一枕橫扇紈低粉面面粉低紈扇涼月淡侵床床侵淡月涼又東風有意留人住熏風無意吹人去去住兩茫然相逢成短緣平生花栁笑過後關心少今日奈情何為伊饒恨多又去年恰好雙星節鵲橋未渡人離别不恨障雲生恨他真個行天涯消息近不見乘鸞影栁外鷓鴣聲幾回和夢驚又淺寒帶暝和烟下輕陰挾雨隨風灑翠幕護重簾篆香銷半奩平生風雨夜怕近芭蕉下今夕定愁多蕭蕭聲奈何又客窗曾剪燈花弄誰教來去如春夢冷落舊梅臺小桃相次開人間春易老只有山中好閒却槿花籬莫教溪外知又曉烟籠日浮山翠春風著水回川媚逺近碧重重人家山色中野花香自度似識幽人處安得著三間與山終日閒又扶犂野老田東睡插花山女田西醉醉眼眩東西看看桃滿溪耕桑山下足紈綺人間俗莫管舊東風從教吹軟紅浣溪沙病中有以蘭花相供者戲書天女殷勤著意多散花猶記病維摩肯來丈室問云何腰佩摘來煩玉笋鬢香分處想秋波不知真個有情麼又遙想當年出鳯雛王闕風有未全疏祇今朱紱為誰紆芳草池塘春夢後粉香簾幕曉晴初一簪華髮要人梳又翠葆扶疏傍藥闌亂飄緑沼滿書單清明時節又看看小雨勒成春尾恨東風偏作夜來寒琴心老盡不須彈又薄日移陰午暑空一杯何事便潮紅扇紈揮盡却疏慵早睡情懷氷枕外夜涼消息雨荷中不須留燭眩房櫳又閒倚前榮小扇車晚妝無力嚲雲鴉凝情看落一庭花笑挽清風歸玉枕懶隨缺月傍窗紗羞紅兩臉上嬌霞㸃絳唇梅雨收黃暑風依舊閒庭院露荷輕顫只有香浮面挂起西窗月淡無人見幽情逺墮叉低扇好個涼方便愁倚闌令三榮道上賦山無數雨蕭蕭路迢迢不似芙蓉城下去栁如腰夢隨春絮飄飄知他在第幾朱橋說與杜鵑休喚怕魂銷又春猶淺栁初芽杏初花楊栁杏花交映處有人家玉窗明暖烘霞小屏上水逺山斜昨夜酒多春睡重莫驚他生查子溪光曲曲村花影重重樹風物小桃源春事還如許情知送客來又作尋芳去可惜一春詩總為閒愁賦又長記别郎時月淡梅花影梅影又橫窗不見江南信無心換夕香有分憐朝鏡不怕瘦稜稜只怕梅開盡又春日閨情蘭帷夜色高繡被春寒擁何事玉樓人屢踏楊花夢分明相見遲不道幽情重乞個好因緣莫待來生種長相思對重陽感重陽身在西風天一方年年人斷腸景凄涼客凄涼縱有黃花祇異鄉晚雲連夢長又酒孤斟客孤吟戲馬臺荒露草深英雄何處尋愛登臨莫登臨定是愁來關客心莫天烟水沈又風敲窗雨敲窗窗外芭蕉雲作幢聲聲愁對床對銀釭㸃銀釭夢採芙蓉隔一江幾時蝴蝶雙如夢令風入藕花翻重夜氣與香俱縱月又帶風來涼意一襟誰共情重情重可惜短宵無夢憶王孫蕭蕭梅雨斷人行門掩殘春緑䕃生翠被寒燈枕自橫夢初驚窗外啼鵑催五更書舟詞
