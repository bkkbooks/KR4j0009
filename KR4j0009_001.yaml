body:
  text: 書舟詞宋程垓撰摸魚兒掩凄涼黃昏庭院角聲何處嗚咽矮窗曲屋風燈冷還是苦寒時節凝竚切念翠被熏籠夜夜成虛設倚闌愁絶聽鳯竹聲中犀幃影外􅉡􅉡釀寒雪傷心處却憶當年輕别梅花滿院初發吹香弄蕊無人見惟見暮雲千疊情未徹又誰料而今好夢分胡越不堪重說但記得當初重門鎖處猶有夜深月洞庭春色錦字親裁淚巾偷裛細說舊時記笑桃門巷妝窺寶靨弄花庭榭香溼羅衣幾度相隨遊冶去任月細風尖猶未歸多少事有垂楊眼見紅燭心知如今事都過也但贏得雙鬢成絲歎半妝紅豆相思有分兩分青鏡重合難期惆悵一春飛絮亂夢悠揚教人分付誰銷魂處又梨花雨暗半掩重扉南浦金鴨懶熏香向晚來春酲一枕無緒濃緑漲瑤窗東風外吹盡亂紅飛絮無言竚立斷腸惟有流鶯語碧雲欲暮空惆悵韶華一時虛度追思舊日心情記題葉西樓吹花南浦老去覺歡疏傷春恨都付斷雲殘雨黃昏院落問誰猶在憑闌處可堪杜宇空只解聲聲催他春去水龍吟夜來風雨囱囱故園定是花無幾愁多愁極等閒孤負一年芳意栁困花慵杏青梅小對人容易算好春長在好花長見元只是人憔悴回首南池舊事恨星星不堪重記如令但有看花老眼傷時清淚不怕逢花瘦只愁怕老來風味待繁紅亂處留雲借月也須拚醉四代好翠幕東風早蘭窗夢又被鶯聲驚覺起來空對平階弱絮滿庭芳草厭厭未欣懷抱記栁外人家曾到憑畫闌那更春好花好酒好人好春好尚恐闌珊花好又怕飄零難保直饒酒好未扺意中人好相逢盡拚醉倒况人與才情未老又豈關春去春來花愁花惱朩蘭花慢春怨倩嬌鶯婉燕說不盡此時情正小院春闌芳園晝鎖人去花零慿高試回望眼奈遙山逺水隔重雲誰遣風狂雨橫便教無計留春情知雁杳與鴻冥自難寄丁寧縱栁院顰深桃門笑在知屬何人衣篝幾回忘了奈殘香猶有舊時熏空使風頻卷絮為他飄蕩花城念奴嬌秋夜秋風秋雨正黃昏供斷一窗愁絶帶減衣寬誰念我難忍重城離别轉枕褰帷挑燈整被總是相思切知他别後負人多少風月不是怨極愁濃只愁重見了相思難說料得新來魂夢裏不管飛來蝴蝶排悶人間寄愁天上終有歸時節如今無奈亂雲依舊千疊閨怨無悶天與多才不合更與殢栁憐花情分甚總為才情惱人方寸早是春殘花褪也不料一春都成病自失笑因甚腰圍半減淚珠頻搵難省也怨天也自恨怎免千般思忖倩人說與又却不忍拚了一生愁悶又只恐愁多無人問到這裏天也憐人看他穩也不穩八聲甘州問東君既解遣花開不合放花飛念春風枝上一分花減一半春歸忍見千紅萬紫容易漲桃溪花自隨流水無計追隨不忍憑高南望記舊時行處芳意菲菲嘆年來春減花與故人非縱使梁園賦猶在奈長卿老去亦何為空搔首亂雲堆裏立盡斜暉滿庭芳時在臨安晚秋登臨南月驚烏西風破雁又是秋滿平湖採蓮人盡寒色戰菰蒲舊信江南好景一萬里輕覓蓴鱸誰知道吳儂未識蜀客已情孤憑高增悵望湘雲盡處都是平蕪問故鄉何日重見吾廬縱有荷紉芰製終不似菊短籬疏歸情逺三更雨夢依舊繞庭梧玉漏遲一春渾不見那堪又是花飛時節忍對危闌數曲暮雲千疊門外星星栁眼看誰似當時風月愁萬結憑誰為我殷勤低說不是慣却春心奈新燕傳情舊鶯饒舌冷篆餘香莫放等閒消歇縱使繁紅褪盡猶自有酴醿堪折魂夢切不耐飛來蝴蝶滿江紅憶别門掩垂楊寶香度翠簾重疊春寒在羅衣初試素肌猶怯薄靄籠花天欲暮小風送角聲初咽但獨褰幽幌悄無言傷離别衣上雨眉間月滴不盡顰空切羡栖梁歸燕入簾雙蝶愁緒多於花絮亂柔腸過似丁香結問甚時重理錦囊書從頭說又水逺山明秋容淡不禁搖落况正是樓臺高處晚涼猶薄月在衣裳風在袖氷生枕簟香生幕算四時佳處是清秋須行樂東籬下西窗角尋舊菊催新酌笑廣平何事對秋蕭索搖葉聲聲深院宇折荷寸寸閒池閣待歸來閒把朩犀花重熏却又葺屋為舟身便是烟波釣客况人間元似泛家浮宅秋晚雨聲篷背穩夜深月影窗櫺白有滿船詩酒滿船書隨宜索也不怕雲濤隔也不怕風帆側但獨醒還睡自歌還歇卧後從教鰍鱔舞醉來一任乾坤窄恐有時撑向大江頭占風色雪獅兒斷雲低晚輕烟帶暝風驚羅幕數㸃梅花香倚雪窗搖落紅爐對謔正酒面瓊酥初削雲屏暖不知門外月寒風惡迤邐慵雲半掠笑盈盈閒弄寶箏絃索暖極生春已向橫波先覺花嬌栁弱漸倚醉要人扶著低告欣早把被香熏却攤破江城子娟娟霜月又侵門對黃昏怯黃昏愁把梅花獨自泛清樽酒又難禁花又惱漏聲逺一更更總斷魂斷魂斷魂不堪聞被半溫香半溫睡也睡也睡不穩誰與溫存只有床前紅燭伴啼痕一夜無眠連曉角人瘦也比梅花瘦幾分驀山溪老來風味是事都無可只愛小書舟賸圍著琅玕幾個呼風約月隨分樂生涯不羡富不憂貧不怕烏蟾墮三杯徑醉轉覺乾坤大醉後百篇詩儘從他龍吟鶴和升沈萬事還與本來天青雲上白雲間一任安排我最高樓舊心事說著兩眉羞記得憑肩遊緗裙羅襪桃花岸薄衫輕扇杏花樓幾番行幾番醉幾番留也誰料春風吹已斷又誰料朝雲飛亦散天易老恨難酬蜂兒不解知人苦燕兒不解說人愁舊情懷消不盡幾時休瑤階草空山子規呌月破黃昏冷簾幕風輕緑暗紅又盡自從别後粉銷香膩一春成病那堪晝閒日永恨難整起來無語緑萍破處池光淨悶理殘妝照花獨自憐瘦影睡來又怕飲來越醉醒來却悶看誰似我孤另上平曲惜春愛春歸憂春去為春忙旋㸃檢雨障雲防遮紅護緑翠幃羅幕任高張海棠明月杏花天更惜濃芳喚鶯吟招蝶拍迎栁舞倩桃妝盡呼起萬籟笙簧一觴一咏儘教陶寫繡心腸笑他人世漫嬉遊擁翠偎香孤鴈兒在家不覺窮冬好向客裏方知道故園梅子正開時記得清樽頻倒高燒紅蠟暖熏羅幌一任花枝惱如今客裏傷懷抱忍雙鬢隨花老小窗獨自對黃昏只有月華飛到假饒真個雁書頻寄何似歸來早又有尼從人而復出者戲用張子野事賦此雙鬟乍綰橫波溜記當日香心透誰教容易逐雞飛輸却春風先手天公元也管人憔悴放出花枝瘦幾宵和月來相就問何處春山鬬祇應深院鎖嬋娟枉却嬌花時候何時為我小梯橫閣試約黃昏後一叢花閨怨街或刻御行傷春時候一憑闌何况别離難東風只解催人去也不道鶯老花殘青箋未約紅綃忍淚無計鎖征鞍寶叉瑤鈿一時閒此恨苦天慳如今直恁拋人去也不念人瘦衣寬歸來忍見重樓淡月依舊五更寒祝英臺近晚春墜紅輕濃緑潤深院又春晚睡起厭厭無語小妝懶可堪三月風光五更魂夢又都被杜鵑催趲怎消遣人道愁與春歸春歸愁未斷閒倚銀屏羞怕淚痕滿斷腸沈水重熏瑤琴閒理奈依舊夜寒人逺碧牡丹睡起情無著曉雨盡春寒弱酒盞飄零幾日頓疏行樂試數花枝間此情何若為誰開為誰落正愁却不是花情薄花元笑人蕭索舊觀千紅至今泠夢難託燕麥春風更幾人驚覺對花羞為花惡小桃紅不恨殘花嚲不恨殘春破只恨流光一年一度又催新火縱青天白日繫長繩也留春得麼花院從教鎖春事從教過燒笋園林嘗梅臺榭有何不可已安排珍簟小胡床待日長閒坐紅娘子小小閒窗底曲曲深屏裏一枕新涼半床明月留人歡意奈梅花引裏喚人行苦隨他無計幾㸃清觴淚數曲烏絲紙見少離多心長分短如何得是到如今留下許多愁枉教人憔悴天仙子慘慘霜林冬欲盡又是溪梅寒弄影矮窗曲屋夜香燒人已靜燈垂燼㸃滴芭蕉和雨聽約個歸期猶未定一夜夢魂終不穩知他勾得許多情真個悶無人問說與畫樓應不信青玉案用賀方回韻寶林巖畔凌雲路記藉草尋梅去詠緑書紅知幾度行雲歸後碧雲遮斷寂寞人何處一聲長笛江天暮别後誰吟倚樓句勻面照溪心已許欲憑錦字寫人愁去生怕梨花雨芭蕉雨雨過涼生藕葉晚庭消盡暑渾無熱枕簟不勝香滑爭奈寶帳情生金尊意愜玉人何處夢蝶思一見氷雪須寫個帖兒丁寧說試問道肯來麼今夜小院無人重樓有月酷相思惜别月掛霜林寒欲墜正門外催人起奈離别如今真個是欲住也留無計欲去也來無計馬上離情衣上淚各自供憔悴問江路梅花開也未春到也須頻寄人到也須頻寄漁家傲彭門道中早起野店無人霜似水清燈照影寒侵被門外行人催客起因個事老來方有思家淚寄問梅花開也未愛花只有歸來是想見小喬歌舞地渾含喜天涯不念人憔悴又獨朩小舟烟雨溼燕兒亂㸃春江碧江上青山隨意覓人寂寂落花芳草催寒食昨夜青樓今日客吹愁不得東風力細拾殘紅書怨泣流水急不知那個傳消息攤破南鄉子休賦惜春詩留春住說與人知一年已負東風瘦說愁說恨數期數刻只望歸時莫怪杜鵑啼真個也喚得人歸歸來休恨花開了梁間燕子且教知道人也雙飛破陳子小小紅泥院宇深深翠色屏幃簇定熏爐酥酒軟門外東風寒不知恰疑三月時叉影半欹緑子歌聲輕度紅兒醉裏不愁更漏斷更要梅花看幾枝起來霜月低折紅英即叉頭鳯正伯更名折紅英桃花暖楊花亂可憐朱户春强半長記憶探芳日笑憑郎肩殢紅偎碧惜惜惜春宵短離腸斷淚痕長向東風滿憑青翼問消息花謝春歸幾時來得憶憶憶一剪梅舊日心期不易招重來孤負幾個良宵尋常不見儘相邀見了知他許大無聊昨夜梅花插翠翹影落清溪應也魂消假饒真個住山腰那個金章換得漁樵又小㑹幽歡整及時花也相宜人也相宜寶香未斷燭光低莫厭杯遲莫恨歡遲夜漸深深漏漸稀風已侵衣露已沾衣一杯重勸莫相違何似休歸何自同歸又斗轉參橫一夜霜玉律聲中又報新陽起來無緒賦行藏只喜人間一線添長簾幕埀埀月半廊節物心情都付椒觴年華漸晚鬢毛蒼身外功名休苦思量臨江仙合江放舟送我南來舟一葉誰教催動鳴榔高城不見水茫茫雲灣才幾曲折盡九回腸買酒澆愁愁不盡江烟也共凄涼和天瘦了也何妨只愁今夜雨更做淚千行又濃緑鎖窗閒院靜照人明月團團夜長幽夢見伊難瘦從香臉薄愁到翠眉殘只道花時容易見如今花盡春闌畫樓依舊五更寒可憐紅繡被空記合時歡鳯棲梧客臨安連日愁霖旅枕無寐起作九月江南烟雨裏客枕凄涼到曉渾無寐起上小樓觀海氣昏昏半約漁樵市斷鴈西邊家萬里料得秋來笑我歸無計劒在床頭書在几未甘分付黃花淚又有客錢塘江上住十日亝居九日愁風雨斷送一春彈指去荷花又繞南山渡湖上幽尋君已許消息不來望得行雲暮芳草夢魂應記取不成忘却池塘句又門外飛花風約住消息江南已釀黃梅雨蜀客望鄉歸不去當時不合催南渡憂國丹心曽獨許縱吐長虹不奈斜陽暮莫道春光難攬取少陵辦得尋花句又南窗偶題薄薄窗油清似鏡兩面疏簾四壁文書靜小篆焚香消日永新來識得閒中性人愛人嫌都莫問絮自沾泥不怕東風緊只有詩狂消不盡夜來題破窗花影又送子廉姪南下九月重湖寒意早目斷黃雲冉冉連衰草慘别臨江愁滿抱酒樽時事都相惱聞道吳天消息好鵷鷺西池咫尺君應到若見故人相問勞為言未分書舟老又下十闋或另刻蝶戀花日下船篷人未起一個燕兒說盡傷春意江上殘花能有幾風催雨促成容易湖海客心千萬里著力東風催得人行未相次桃花三月水菱歌誰伴西湖醉又滿路梅英飛雪粉臨水人家先得春光嫩樓底杏花樓外影牆東栁線牆西恨擷翠揉紅何處問暖入眉峰已作傷春困歸路月痕彎一寸芳心只為東風損又春風一夕浩蕩曉來栁色一新寒意勒花春未足只有東風不管春拘束楊栁滿城吹又緑可人青眼還相