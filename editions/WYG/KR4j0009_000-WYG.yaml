body:
  text: 書舟詞詞曲類一詞集之屬提要臣等謹案書舟詞一巻宋程垓撰垓字正伯眉山人其家有擬舫名書舟見本集詞注古今詞話謂號虛舟葢字之誤馬氏經籍考載垓書舟詞一巻傳本或作書舟雅詞二巻而宋史藝文志乃作陳正伯書舟雅詞十一巻則又誤程為陳誤二為十一矣此本為毛晉所刻仍作一巻前有王稱序與陳振孫書録解題所載合序云尚書尤袤曽稱其文過于詩詞今其詩文無可考而詞頗有可觀楊慎詞品最稱其酷相思四代好折秋英數闋葢垓與蘇軾為中表耳濡目染有自來也集内攤破江神子娟娟霜月又侵門一闋諸刻多作康與之江城梅花引詞僅字句小有異同按此調相傳為前半用江城子後半用梅花引故合云江城梅花引今前半自首句至花又惱為江城子後全不似梅花引至過變以下更與兩調俱不合考詞譜載江城子一名江神子應以名攤破江神子為是詳其句格亦屬垓本色其題為康作當屬傳譌又巻末毛晉跋云意難忘一剪梅等俱定為蘇作悉行刪正今考東坡詞内已増入意難忘一首而一剪梅尚未載入其詞亦仍載此集中未嘗刋削然數詞語意淺俚在垓亦非佳製可信其必非軾作晉之所云未詳其何所據也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書舟詞原序程正伯以詩詞名鄉之人所知也余頃嵗遊都下數見朝士往往亦稱道正伯佳句獨尚書尤公以為不然曰正伯之文過於詩詞此乃識正伯之大者也今鄉人有欲刋正伯歌詞求余書其首余以此告之且為言正伯方為當塗諸公以制舉論薦使正伯惟以詞名世豈不小哉則曰古樂府亦文爾初何損於正伯之文哉余用是樂為書之雖然昔晏叔原以大臣子處富貴之極為靡麗之詞其政事堂中舊客尚欲其捐有餘之才覬未至之徳者蓋叔原獨以詞名爾他文則未傳也至少游魯直則已兼之故陳無巳之作自云不減秦七黃九是亦推尊其詞爾余謂正伯為秦黃則可為叔原則不可紹熈甲寅端午前一日王稱季平序
